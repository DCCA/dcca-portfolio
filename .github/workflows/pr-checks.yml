name: PR checks

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Serve production build
        run: |
          bun run preview --host 127.0.0.1 --port 4173 &
          echo "PREVIEW_PID=$!" >> "$GITHUB_ENV"
          # wait for the server to answer (max ~30s)
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://127.0.0.1:4173/dcca-portfolio/; then
              echo "preview up"; exit 0
            fi
            sleep 1
          done
          echo "preview did not start"; exit 1

      - name: Contrast gate (WCAG AA)
        env:
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node scripts/contrast.mjs http://127.0.0.1:4173/dcca-portfolio/

      - name: Overflow & console gate + screenshots
        env:
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node scripts/shoot.mjs http://127.0.0.1:4173/dcca-portfolio/ ci-shots pr

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-screenshots
          path: ci-shots/
          if-no-files-found: ignore
